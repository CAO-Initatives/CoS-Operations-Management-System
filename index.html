s and Maggie\'s Key Dates. <span class="b bg3">A</span> = Ari <span class="b bp">M</span> = Maggie. Same-day multi-source entries shown together.</div>':''} ${calView==='grid'?buildCalGrid(ev):buildCalList(ev)}`; } function buildCalGrid(ev){ const years=[...new Set(ev.map(e=>dp(e.date).getFullYear()))].sort(); let h=''; years.forEach(yr=>{ h+=`<h3 style="margin:16px 0 10px;font-size:13px;font-weight:800;color:var(--nv)">${yr}</h3><div class="cal-grid">`; for(let m=0;m<12;m++){ let me=ev.filter(e=>{let d=dp(e.date);return d&&d.getMonth()===m&&d.getFullYear()===yr}).sort((a,b)=>a.date.localeCompare(b.date)); let isnow=m===CURM&&yr===2026; h+=`<div class="cmo"><div class="cmh ${isnow?'now':''}">${MNF[m]} ${yr}</div><div class="cmb">`; if(!me.length)h+='<div class="im">&mdash;</div>'; me.forEach(e=>{h+=`<div class="pill ${CC[e.category]||'coth'}" onclick="openEvModal('${e.id}')" title="${esc(e.location||'')} - ${esc(e.role||'')}"><span>${dp(e.date).getDate()} ${esc(e.title)}</span><span class="stag">${e.source==='Ari'?'A':'M'}</span></div>`;}); h+='</div></div>'; } h+='</div>'; }); return h; } function buildCalList(ev){ if(!ev.length)return'<div class="card"><div class="cb" style="text-align:center;color:var(--mu);padding:32px">No events found</div></div>'; let rows=ev.sort((a,b)=>a.date.localeCompare(b.date)).map(e=>`<tr><td style="white-space:nowrap">${fmt(e.date)}</td><td style="white-space:nowrap;color:var(--mu)">${esc(e.time||'')}</td><td><strong>${esc(e.title)}</strong>${e.notes?`<div class="im">${esc(e.notes)}</div>`:''}</td><td>${bdg(e.source,e.source==='Ari'?'bg3':'bp')}</td><td>${bdg(e.category,CB[e.category]||'bgr')}</td><td style="font-size:11px;color:var(--mu)">${esc(e.location||'')}</td><td style="font-size:11px">${esc(e.role||'')}</td><td>${stB(e.remarks||'')}</td><td class="no-print" style="white-space:nowrap"><button class="btn bg2 bxs" onclick="openEvModal('${e.id}')">Edit</button><button class="btn br2 bxs" onclick="delEv('${e.id}')">&times;</button></td></tr>`).join(''); return`<div class="card"><div class="tw"><table><thead><tr><th>Date</th><th>Time</th><th>Event</th><th>Src</th><th>Category</th><th>Location</th><th>Role</th><th>Remarks</th><th class="no-print"></th></tr></thead><tbody>${rows}</tbody></table></div></div>`; } /* ROB */ function rRoB(){ const cls={'':'sns','ip':'sip','dn':'sdn'}; const lbl={'':'','ip':'In Progress','dn':'Done'}; let h=`<div class="tb"><div class="tbl rob-ctl"><span style="font-size:11px;color:var(--mu)">Single-click any cell to cycle status. Double-click any cell to edit monthly activity text and status.</span></div><div class="tbr"><button class="btn br2 bsm no-print" onclick="openRobWsModal()">&#10133; Workstream</button><button class="btn bn bsm no-print" onclick="doPrint()">Print</button></div></div><div class="rob-wrap"><table class="robt"><thead><tr><th>Workstream</th>${MNA.map((m,i)=>`<th style="${i===CURM?'background:var(--rd)':''}">${m}</th>`).join('')}</tr></thead><tbody>`; ST.rob.forEach((row,ri)=>{ h+=`<tr><td><span class="rctxt">${esc(row.ws)}</span><span class="rob-act no-print"><button class="btn bg2 bxs" onclick="event.stopPropagation();openRobWsModal(${ri})">Edit</button><button class="btn br2 bxs" onclick="event.stopPropagation();deleteRobWs(${ri})">Delete</button></span></td>`; row.cells.forEach((cell,ci)=>{ h+=`<td class="rcl wrap ${cls[row.st[ci]||'']} ${ci===CURM?'rcur':''}" onclick="cycleRob(${ri},${ci})" ondblclick="openRobCellModal(${ri},${ci})" title="Double click to edit this month"><div>${esc(cell||'--')}</div><div style="font-size:9px;margin-top:2px">${lbl[row.st[ci]||'']}</div></td>`; }); h+='</tr>'; }); h+='</tbody></table></div><div class="guide-note no-print">RoB management: use Add Workstream to add a row, Edit to rename a row, Delete to remove a row, and double click a month cell to edit text and status.</div>'; document.getElementById('rob').innerHTML=h; } function cycleRob(ri,ci){const c={'':'ip','ip':'dn','dn':''};ST.rob[ri].st[ci]=c[ST.rob[ri].st[ci]||''];save();rRoB()} function openRobWsModal(ri){ const row=(Number.isInteger(ri)?ST.rob[ri]:{ws:'',cells:Array(12).fill(''),st:Array(12).fill('')}); MC={type:'robws',id:(Number.isInteger(ri)?ri:null)}; openModal(Number.isInteger(ri)?'Edit Workstream':'Add Workstream',`<div class="fg"><label>Workstream Name</label><input class="fc" id="f_rob_ws" value="${esc(row.ws||'')}" placeholder="Enter workstream name"></div><div class="guide-note">Monthly text is edited by double clicking individual month cells in the RoB grid.</div>`,'robws',Number.isInteger(ri)?ri:null); } function openRobCellModal(ri,ci){ const row=ST.rob[ri]; const status=row.st[ci]||''; MC={type:'robcell',id:`${ri}:${ci}`}; openModal(`Edit ${row.ws} - ${MNA[ci]}`,`<div class="fg"><label>Monthly Activity Text</label><textarea class="fc" id="f_rob_cell">${esc(row.cells[ci]||'')}</textarea></div><div class="fg"><label>Status</label><select class="fc" id="f_rob_status"><option value="" ${status===''?'selected':''}>Blank</option><option value="ip" ${status==='ip'?'selected':''}>In Progress</option><option value="dn" ${status==='dn'?'selected':''}>Done</option></select></div>`,'robcell',`${ri}:${ci}`); } function deleteRobWs(ri){if(!confirm('Delete this workstream from Cadence (RoB)?'))return;ST.rob.splice(ri,1);save();rRoB()} function rSOPs(){ let f=ST.sops.filter(s=>!sopQ||(s.process+s.owner).toLowerCase().includes(sopQ.toLowerCase())); let rows=f.map((s,i)=>`<tr><td style="color:var(--mu);font-size:11px">${i+1}</td><td><strong>${esc(s.process)}</strong></td><td>${owT(s.owner)}</td><td>${s.link?`<a href="${esc(s.link)}" target="_blank" class="b bgr" style="font-size:10px">&#128279; Open</a>`:'<span style="color:var(--mu);font-size:11px">&mdash;</span>'}</td><td style="color:var(--mu);font-size:11px">${esc(s.notes||'')}</td><td class="no-print" style="white-space:nowrap"><button class="btn bg2 bxs" onclick="openSopModal('${s.id}')">Edit</button><button class="btn br2 bxs" onclick="delItem('sops','${s.id}')">&times;</button></td></tr>`).join(''); document.getElementById('sops').innerHTML=` <div class="tb"><div class="tbl"><input class="srch" placeholder="Search SOPs..." value="${esc(sopQ)}" oninput="sopQ=this.value;rSOPs()"></div><div class="tbr"><button class="btn br2 bsm no-print" onclick="openSopModal()">Add SOP</button></div></div><div class="card"><div class="tw"><table><thead><tr><th>#</th><th>Process</th><th>Owner</th><th>SOP Link</th><th>Notes</th><th class="no-print"></th></tr></thead><tbody>${rows}</tbody></table></div></div>`; } /* DELIVERABLES */ function rDel(){ let f=ST.tasks.map(t=>({...t,_s:t.status!=='Complete'&&isOv(t.due)?'Overdue':t.status})); if(delOw!=='All')f=f.filter(t=>t.owner===delOw); if(delSt!=='All')f=f.filter(t=>t._s===delSt); if(delQ)f=f.filter(t=>t.title.toLowerCase().includes(delQ.toLowerCase())); const ord={'Overdue':0,'In Progress':1,'Not Started':2,'Complete':3}; f.sort((a,b)=>(ord[a._s]||4)-(ord[b._s]||4)||(a.due||'z').localeCompare(b.due||'z')); const owners=['All',...new Set(ST.tasks.map(t=>t.owner))]; let rows=f.map(t=>{ let ov=t._s==='Overdue'; return`<tr><td><strong>${esc(t.title)}</strong>${t.notes?`<div class="im">${esc(t.notes)}</div>`:''}</td><td>${owT(t.owner)}</td><td class="${ov?'ovd':''}" style="white-space:nowrap">${fmt(t.due)}${ov?' ':''}</td><td>${priB(t.priority)}</td><td>${stB(t._s)}</td><td class="no-print" style="white-space:nowrap"><button class="btn bg2 bxs" onclick="openTaskModal('${t.id}')">Edit</button><button class="btn br2 bxs" onclick="delItem('tasks','${t.id}')">&times;</button></td></tr>`; }).join(''); document.getElementById('del').innerHTML=` <div class="tb"><div class="tbl"><div class="chips"> ${['All','Overdue','In Progress','Not Started','Complete'].map(s=>`<div class="chip ${delSt===s?'on':''}" onclick="delSt='${s}';rDel()">${s}</div>`).join('')} </div><select class="fc" style="width:auto;padding:4px 8px" onchange="delOw=this.value;rDel()">${owners.map(o=>`<option ${delOw===o?'selected':''}>${esc(o)}</option>`).join('')}</select><input class="srch" placeholder="Search..." value="${esc(delQ)}" oninput="delQ=this.value;rDel()"></div><div class="tbr"><button class="btn br2 bsm no-print" onclick="openTaskModal()">Add Task</button></div></div><div class="card"><div class="tw"><table><thead><tr><th>Title</th><th>Owner</th><th>Due</th><th>Priority</th><th>Status</th><th class="no-print"></th></tr></thead><tbody>${rows||'<tr><td colspan="6" style="text-align:center;color:var(--mu);padding:24px">No items match filter</td></tr>'}</tbody></table></div></div>`; } /* MODALS */ function rGuide(){ document.getElementById('guide').innerHTML=` <div class="guide-wrap"><div class="guide-hero"><h1>CAO Operations Management System (OMS) - User Guide</h1><p>This guide explains each screen, what it is for, and how to maintain the content inside the system. The file saves changes in your browser using local storage.</p></div><div class="guide-grid"><div><div class="guide-sec"><div class="guide-sec-hd"><h2>Getting Started</h2></div><div class="guide-sec-bd"><ul class="guide-list"><li><strong>Navigation:</strong> Use the tabs to move between Dashboard, Weekly Brief, CAO Visibility, Calendars, Cadence (RoB), SOPs, Deliverables, and User Guide.</li><li><strong>Saving:</strong> Changes save automatically after add, edit, or delete actions. The timestamp in the upper right confirms the latest save.</li><li><strong>Versioning:</strong> The header badge and build stamp identify the active file version and build.</li><li><strong>Reset:</strong> Reset restores the default seed data.</li><li><strong>Print:</strong> Print outputs the current active tab in a print friendly format.</li></ul><div class="guide-note"><strong>Important:</strong> Saved changes live in browser local storage for this file on this device and browser.</div></div></div><div class="guide-sec"><div class="guide-sec-hd"><h2>Screen by Screen Guide</h2></div><div class="guide-sec-bd"><ul class="guide-list"><li><strong>Dashboard:</strong> Reviews overdue items, in progress work, items for EB review, and events in the next 30 days.</li><li><strong>Weekly Brief:</strong> Builds a date based weekly summary with locations, high attention meetings, conflicts, event review, and upcoming events.</li><li><strong>CAO Visibility:</strong> Presents an executive scan with summary KPIs and section cards for cadence, inbound requests, assignments, agendas and materials, board commitments, deadlines, review items, and FYIs.</li><li><strong>Calendars:</strong> Switch between Ari events, Maggie key dates, and the master overlay. Search, add, edit, print, and toggle between grid and list views.</li><li><strong>Cadence (RoB):</strong> Single click a month cell to cycle status. Double click a month cell to edit the activity text and status. Use Add Workstream, Edit, and Delete for row management.</li><li><strong>SOPs:</strong> Search and maintain the SOP catalog. Open linked documents from the table.</li><li><strong>Deliverables:</strong> Filter tasks by status and owner, search by title, and add, edit, or delete deliverables.</li></ul></div></div></div><div><div class="guide-sec"><div class="guide-sec-hd"><h2>How to Maintain Data</h2></div><div class="guide-sec-bd"><ul class="guide-list"><li><strong>Add a record:</strong> Use Add buttons on the relevant tab.</li><li><strong>Edit a record:</strong> Use Edit buttons in tables or cards, or double click a RoB cell.</li><li><strong>Delete a record:</strong> Use Delete or X and confirm.</li><li><strong>Print for leadership:</strong> Open the desired tab first, then click Print.</li></ul></div></div><div class="guide-sec"><div class="guide-sec-hd"><h2>Troubleshooting</h2></div><div class="guide-sec-bd"><ul class="guide-list"><li><strong>Edits disappeared:</strong> reopen the file in the same browser and device and check the save timestamp.</li><li><strong>Need a clean demo:</strong> use Reset.</li><li><strong>RoB text will not update:</strong> double click the month cell; a single click only cycles status.</li></ul></div></div></div></div></div>`; } function openEvModal(id){ let e=id?ST.events.find(x=>x.id===id):{source:'Ari',category:'Other',remarks:'',slides:''}; MC={type:'ev',id}; const catOpts=Object.keys(CC).map(c=>`<option ${e.category===c?'selected':''}>${c}</option>`).join(''); openModal(id?'Edit Event':'Add Event',` <div class="fr"><div class="fg"><label>Title</label><input class="fc" id="f_title" value="${esc(e.title||'')}"></div><div class="fg"><label>Date</label><input type="date" class="fc" id="f_date" value="${e.date||''}"></div></div><div class="fr"><div class="fg"><label>Time</label><input class="fc" id="f_time" value="${esc(e.time||'')}"></div><div class="fg"><label>Source</label><select class="fc" id="f_src"><option ${e.source==='Ari'?'selected':''}>Ari</option><option ${e.source==='Maggie'?'selected':''}>Maggie</option></select></div></div><div class="fr"><div class="fg"><label>Category</label><select class="fc" id="f_cat">${catOpts}</select></div><div class="fg"><label>Location</label><input class="fc" id="f_loc" value="${esc(e.location||'')}"></div></div><div class="fr"><div class="fg"><label>Role</label><input class="fc" id="f_role" value="${esc(e.role||'')}"></div><div class="fg"><label>Organizer</label><input class="fc" id="f_org" value="${esc(e.organizer||'')}"></div></div><div class="fr"><div class="fg"><label>Remarks</label><input class="fc" id="f_rem" value="${esc(e.remarks||'')}"></div><div class="fg"><label>Slides</label><input class="fc" id="f_slides" value="${esc(e.slides||'')}"></div></div><div class="fg"><label>Notes</label><textarea class="fc" id="f_notes">${esc(e.notes||'')}</textarea></div> `,'ev',id); } function openSopModal(id){ let s=id?ST.sops.find(x=>x.id===id):{process:'',owner:'',link:'',notes:''}; MC={type:'sop',id}; openModal(id?'Edit SOP':'Add SOP',` <div class="fg"><label>Process</label><input class="fc" id="f_process" value="${esc(s.process||'')}"></div><div class="fr"><div class="fg"><label>Owner</label><input class="fc" id="f_owner" value="${esc(s.owner||'')}"></div><div class="fg"><label>Notes</label><input class="fc" id="f_notes" value="${esc(s.notes||'')}"></div></div><div class="fg"><label>Link</label><input class="fc" id="f_link" value="${esc(s.link||'')}"></div> `,'sop',id); } function openTaskModal(id){ let t=id?ST.tasks.find(x=>x.id===id):{title:'',owner:'',due:'',priority:'Medium',status:'Not Started',notes:''}; MC={type:'task',id}; openModal(id?'Edit Task':'Add Task',` <div class="fg"><label>Title</label><input class="fc" id="f_title" value="${esc(t.title||'')}"></div><div class="fr"><div class="fg"><label>Owner</label><input class="fc" id="f_owner" value="${esc(t.owner||'')}"></div><div class="fg"><label>Due Date</label><input type="date" class="fc" id="f_due" value="${t.due||''}"></div></div><div class="fr"><div class="fg"><label>Priority</label><select class="fc" id="f_priority"><option ${t.priority==='High'?'selected':''}>High</option><option ${t.priority==='Medium'?'selected':''}>Medium</option><option ${t.priority==='Low'?'selected':''}>Low</option></select></div><div class="fg"><label>Status</label><select class="fc" id="f_status"><option ${t.status==='Not Started'?'selected':''}>Not Started</option><option ${t.status==='In Progress'?'selected':''}>In Progress</option><option ${t.status==='Complete'?'selected':''}>Complete</option></select></div></div><div class="fg"><label>Notes</label><textarea class="fc" id="f_notes">${esc(t.notes||'')}</textarea></div> `,'task',id); } function openNewItem(type){ MC={type,id:null}; if(type==='inc'){openModal('Add Incoming Item',`<div class="fg"><label>Item</label><input class="fc" id="f_item" value=""></div><div class="fg"><label>Source</label><input class="fc" id="f_source" value=""></div><div class="fg"><label>Status</label><input class="fc" id="f_status" value="Pending"></div><div class="fg"><label>Dean Input Needed</label><textarea class="fc" id="f_input"></textarea></div>`,'inc',null);} else if(type==='fr'){openModal('Add&#128065; For Review Item',`<div class="fg"><label>Item</label><input class="fc" id="f_item" value=""></div><div class="fg"><label>Input Needed</label><textarea class="fc" id="f_input"></textarea></div><div class="fg"><label>Requested By</label><input class="fc" id="f_by" value=""></div><div class="fg"><label>Link</label><input class="fc" id="f_link" value=""></div>`,'fr',null);} } function saveModal(){ const t=MC.type,id=MC.id; if(t==='ev'){ const o={id:id||uid(),source:gv('f_src'),title:gv('f_title'),date:gv('f_date'),time:gv('f_time'),location:gv('f_loc'),role:gv('f_role'),organizer:gv('f_org'),category:gv('f_cat'),remarks:gv('f_rem'),slides:gv('f_slides'),notes:gv('f_notes')}; if(!o.title||!o.date){alert('Title and date required');return} if(id){ST.events[ST.events.findIndex(x=>x.id===id)]=o}else ST.events.push(o); closeModal();save();rCal();renderAll(); } else if(t==='sop'){ const o={id:id||uid(),process:gv('f_process'),owner:gv('f_owner'),link:gv('f_link'),notes:gv('f_notes')}; if(!o.process){alert('Process name required');return} if(id){ST.sops[ST.sops.findIndex(x=>x.id===id)]=o}else ST.sops.push(o); closeModal();save();rSOPs();renderAll(); } else if(t==='task'){ const o={id:id||uid(),title:gv('f_title'),owner:gv('f_owner'),due:gv('f_due'),priority:gv('f_priority'),status:gv('f_status'),notes:gv('f_notes')}; if(!o.title){alert('Title required');return} if(id){ST.tasks[ST.tasks.findIndex(x=>x.id===id)]=o}else ST.tasks.push(o); closeModal();save();rDel();renderAll(); } else if(t==='inc'){ const o={id:uid(),n:ST.incoming.length+1,dateAdded:new Date().toISOString().slice(0,10),item:gv('f_item'),source:gv('f_source'),status:gv('f_status'),link:'',input:gv('f_input')}; ST.incoming.push(o);closeModal();save();renderAll(); } else if(t==='fr'){ const o={id:uid(),n:ST.forReview.length+1,dateAdded:new Date().toISOString().slice(0,10),item:gv('f_item'),inputNeeded:gv('f_input'),requestedBy:gv('f_by'),link:gv('f_link'),notes:''}; ST.forReview.push(o);closeModal();save();renderAll(); } else if(t==='robws'){ const ws=gv('f_rob_ws').trim(); if(!ws){alert('Workstream name required');return} if(id===0 || id!==null){ST.rob[id].ws=ws}else{ST.rob.push({ws:ws,cells:Array(12).fill(''),st:Array(12).fill('')})} closeModal();save();rRoB();renderAll(); } else if(t==='robcell'){ const parts=String(id).split(':'); const ri=parseInt(parts[0],10), ci=parseInt(parts[1],10); if(Number.isNaN(ri)||Number.isNaN(ci)){alert('Unable to update cell');return} ST.rob[ri].cells[ci]=gv('f_rob_cell'); ST.rob[ri].st[ci]=gv('f_rob_status'); closeModal();save();rRoB();renderAll(); } } function delEv(id){if(!confirm('Delete event?'))return;ST.events=ST.events.filter(x=>x.id!==id);save();rCal()} function delItem(arr,id){if(!confirm('Delete?'))return;ST[arr]=ST[arr].filter(x=>x.id!==id);save();renderAll()} /* INIT */ document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()}); if(!load()){ST=buildSeed();save()} renderAll(); document.getElementById('ts').textContent='Loaded '+new Date().toLocaleTimeString(); </script></body></html>
